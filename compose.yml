services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: talk_to_your_stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talk_to_your_stock"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web-bff:
    build:
      context: .
      dockerfile: dev/Dockerfile
    command: python -m uvicorn web_bff.main:app --host 0.0.0.0 --port 8000
    environment:
      TALK_TO_YOUR_STOCK_ENV: ${TALK_TO_YOUR_STOCK_ENV:-local}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/talk_to_your_stock
      DEV_AUTH_USER_ID: ${DEV_AUTH_USER_ID:-00000000-0000-0000-0000-000000000001}
      DEV_AUTH_EMAIL: ${DEV_AUTH_EMAIL:-dev@example.com}
      MANAGED_AUTH_JWKS_URL: ${MANAGED_AUTH_JWKS_URL:-}
      MANAGED_AUTH_ISSUER: ${MANAGED_AUTH_ISSUER:-}
      MANAGED_AUTH_AUDIENCE: ${MANAGED_AUTH_AUDIENCE:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  agent-service:
    build:
      context: .
      dockerfile: dev/Dockerfile
    command: python -m uvicorn agent_service.main:app --host 0.0.0.0 --port 8001
    environment:
      TALK_TO_YOUR_STOCK_ENV: ${TALK_TO_YOUR_STOCK_ENV:-local}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/talk_to_your_stock
      GOOGLE_ADK_APP_NAME: ${GOOGLE_ADK_APP_NAME:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  comps-service:
    build:
      context: .
      dockerfile: dev/Dockerfile
    command: python -m uvicorn comps_service.main:app --host 0.0.0.0 --port 8002
    environment:
      TALK_TO_YOUR_STOCK_ENV: ${TALK_TO_YOUR_STOCK_ENV:-local}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/talk_to_your_stock
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
